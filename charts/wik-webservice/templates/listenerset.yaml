{{ $root := . }}
{{- if and .Values.webservice.httpRoute.enabled .Values.webservice.httpRoute.tls -}}
{{- if .Capabilities.APIVersions.Has "gateway.networking.k8s.io/v1/ListenerSet" }}
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
{{- else if .Capabilities.APIVersions.Has "gateway.networking.x-k8s.io/v1alpha1/XListenerSet" }}
apiVersion: gateway.networking.x-k8s.io/v1alpha1
kind: XListenerSet
{{- else }}
{{- /* ListenerSet CRDs not available on cluster, silently skip */ -}}
{{- end }}
{{- if or (.Capabilities.APIVersions.Has "gateway.networking.k8s.io/v1/ListenerSet") (.Capabilities.APIVersions.Has "gateway.networking.x-k8s.io/v1alpha1/XListenerSet") }}
metadata:
  name: {{ template "fullname" . }}
  labels:
    app: {{ template "name" . }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
    release: {{ .Release.Name }}
    {{- range $key, $value := (.Values.webservice.listenerSet.labels | default dict) }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
{{- with .Values.webservice.listenerSet.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    {{- if .Values.webservice.httpRoute.gatewayRef.name }}
    name: {{ .Values.webservice.httpRoute.gatewayRef.name }}
    {{- with .Values.webservice.httpRoute.gatewayRef.namespace }}
    namespace: {{ . }}
    {{- end }}
    {{- else }}
    {{- fail "httpRoute.tls requires httpRoute.gatewayRef.name to be set" }}
    {{- end }}
  listeners:
    {{- range .Values.webservice.hosts }}
    - name: {{ . | replace "." "-" }}
      hostname: {{ . | quote }}
      port: {{ $root.Values.webservice.listenerSet.port }}
      protocol: {{ $root.Values.webservice.listenerSet.protocol }}
      tls:
        mode: {{ $root.Values.webservice.listenerSet.tls.mode }}
        certificateRefs:
        {{- if $root.Values.webservice.listenerSet.tls.certificateRefs }}
{{ toYaml $root.Values.webservice.listenerSet.tls.certificateRefs | indent 10 }}
        {{- else }}
          - kind: Secret
            name: {{ template "fullname" $root }}--tls
        {{- end }}
    {{- end }}
{{- end }}
{{- end }}
